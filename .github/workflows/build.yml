name: CI

on:
  push

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        configs: [Release, Debug]
    steps:
    - name: Checkout
      uses: actions/checkout@v2.0.0
      
    - name: Test
      run: brew install gcc@12 || true

    - name: Build project
      uses: nicledomaS/cmake_build_action@v1.4
      with:
        run_tests: ON
        cmake_args: -DCMAKE_CXX_COMPILER=/usr/bin/g++ -DCO_ECS_ENABLE_TESTING=ON -DCO_ECS_CODE_BENCHMARKS=ON -DCO_ECS_ENABLE_EXAMPLES=ON
        config: ${{ matrix.configs }}
        
    - name: Run example
      run: cd build && examples/hello-registry/hello-registry
